# GitHub Pages deployment for the public repository
name: Deploy Mindmarketing to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Add route fallbacks
        shell: bash
        run: |
          cp dist/client/index.html dist/client/404.html
          for route in \
            audit-google-ads-ecommerce \
            cases/google-ads-tactical-gear \
            cases/google-ads-audit-lighting
          do
            mkdir -p "dist/client/$route"
            cp dist/client/index.html "dist/client/$route/index.html"
          done

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Report deployment status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            state="success"
            description="GitHub Pages deployed"
          else
            state="failure"
            description="GitHub Pages deployment failed"
          fi

          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context="pages-deployment" \
            -f description="$description" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
